const STATE={rec:[],low:[],byKey:{},query:"",submitted:"",mode:"auto",chap:"ALL",contentCache:{},figCache:{},figManifest:null,tree:null,browseChap:null,browseSec:null};

async function fetchGz(url){
  const res=await fetch(url);if(!res.ok)throw new Error("HTTP "+res.status);
  const buf=new Uint8Array(await res.arrayBuffer());
  let t;if(buf.length>2&&buf[0]===0x1f&&buf[1]===0x8b)t=pako.ungzip(buf,{to:"string"});else t=new TextDecoder().decode(buf);
  return JSON.parse(t);
}
async function init(){
  try{
    const data=await fetchGz("amm_index.json.gz");
    STATE.rec=data;
    STATE.low=data.map(r=>(r[0]+" "+r[1]).toLowerCase());
    data.forEach((r,i)=>STATE.byKey[r[7]]=i);
    $("cnt").textContent=data.length.toLocaleString();
    const tree={};
    for(let i=0;i<data.length;i++){const r=data[i];const ch=r[2],sec=r[2]+"-"+r[3];tree[ch]=tree[ch]||{};tree[ch][sec]=tree[ch][sec]||[];tree[ch][sec].push(i);}
    STATE.tree=tree;
    // deep link ?task=KEY or ?task=refDigits
    const p=new URLSearchParams(location.search);
    const tk=p.get("task");
    if(tk){
      let i=STATE.byKey[tk];
      if(i===undefined){i=STATE.rec.findIndex(r=>r[8]===tk||r[8]===tk.replace(/-/g,""));}
      if(i>=0){renderUI();openTask(i);return;}
    }
    renderUI();
  }catch(e){$("panel").innerHTML='<div class="empty">Could not load AMM index.<br>'+esc(e.message)+'</div>';}
}
function chapters(){return Object.keys(STATE.tree||{}).sort();}
function chipCss(on,col){return on?`background:${col};color:#04060B;border-color:${col}`:`background:#0B1220;color:#94A3B8;border-color:#1E293B`;}
function renderUI(){
  const MODES=[["auto","SEARCH"],["browse","BROWSE"]];
  $("panel").innerHTML=`
    ${STATE.mode!=="browse"?`<div class="searchbar"><input id="q" placeholder="Task name or AMM ref (e.g. servo, actuator, 27-44-51)…" value="${esc(STATE.query)}"/><button class="btn" onclick="doSearch()">SEARCH</button></div>`:""}
    <div class="chips"><span style="font-size:11px;color:#475569;font-family:'IBM Plex Mono',monospace;margin-right:4px">MODE:</span>
      ${MODES.map(([m,l])=>`<span class="chip" onclick="setMode('${m}')" style="${chipCss(STATE.mode===m,m==='browse'?'#34D399':'#2563EB')}">${l}</span>`).join("")}</div>
    ${STATE.mode!=="browse"?`<div class="chips" id="chapChips"><span class="chip" data-c="ALL" style="${chipCss(STATE.chap==='ALL','#94A3B8')}">ALL</span>${chapters().map(c=>`<span class="chip" data-c="${c}" style="${chipCss(STATE.chap===c,ataColor(c))}">${c}</span>`).join("")}</div>`:""}
    <div id="results"></div>`;
  const q=$("q");if(q){q.oninput=e=>STATE.query=e.target.value;q.onkeydown=e=>{if(e.key==="Enter")doSearch();};}
  const cc=$("chapChips");if(cc)cc.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{STATE.chap=c.dataset.c;renderUI();if($("q"))$("q").value=STATE.query;if(STATE.submitted)doSearch();});
  if(STATE.mode==="browse")renderBrowse();
  else if(STATE.submitted){if($("q"))$("q").value=STATE.query;renderResults();}
  else $("results").innerHTML=`<div class="empty">${STATE.rec.length.toLocaleString()} AMM tasks ready.<br>Search by task name or AMM reference — or tap BROWSE to navigate by ATA chapter.</div>`;
}
function setMode(m){STATE.mode=m;if(m==="browse"){STATE.browseChap=null;STATE.browseSec=null;}renderUI();if(m!=="browse"&&STATE.submitted)doSearch();}
function doSearch(){STATE.submitted=STATE.query=$("q").value;renderResults();}
function renderResults(){
  const box=$("results");const ql=STATE.submitted.trim().toLowerCase().replace(/\s+/g," ");
  if(!ql){box.innerHTML=`<div class="empty">Type a task name or AMM reference.</div>`;return;}
  const terms=ql.replace(/-/g,"").split(" ").filter(Boolean);
  const hits=[];
  for(let i=0;i<STATE.rec.length;i++){
    if(STATE.chap!=="ALL"&&STATE.rec[i][2]!==STATE.chap)continue;
    const hay=STATE.low[i].replace(/-/g,"");
    let ok=true;for(const t of terms)if(hay.indexOf(t)<0){ok=false;break;}
    if(!ok)continue;
    let score=0;const tl=STATE.rec[i][0].toLowerCase();for(const t of terms)if(tl.indexOf(t)>=0)score+=10;
    hits.push([score,i]);if(hits.length>3000)break;
  }
  hits.sort((a,b)=>b[0]-a[0]);
  if(!hits.length){box.innerHTML=`<div class="empty">No matching AMM tasks.</div>`;return;}
  let html=`<div class="meta">${hits.length} MATCHING TASK${hits.length>1?"S":""}</div>`;
  html+=hits.slice(0,400).map(([s,i])=>{const r=STATE.rec[i];const col=ataColor(r[2]);
    return `<div class="trow" style="border-left-color:${col}" onclick="openTask(${i})"><span class="tref" style="color:${col}">${esc(r[1])}</span><span class="ttitle">${esc(r[0])}</span><span class="tgo">read ▸</span></div>`;}).join("");
  box.innerHTML=html;
}
function browseGo(l,v){if(l==="chap"){STATE.browseChap=v;STATE.browseSec=null;}else if(l==="sec")STATE.browseSec=v;else if(l==="backChap"){STATE.browseChap=null;STATE.browseSec=null;}else if(l==="backSec")STATE.browseSec=null;renderBrowse();}
function renderBrowse(){
  const box=$("results");if(!box)return;const tree=STATE.tree||{};
  if(!STATE.browseChap){const chs=Object.keys(tree).sort();
    let html=`<div class="meta">${chs.length} ATA CHAPTERS</div>`;
    html+=chs.map(ch=>{const col=ataColor(ch);const n=Object.values(tree[ch]).reduce((a,s)=>a+s.length,0);
      return `<div class="trow" style="grid-template-columns:60px 1fr 90px;border-left-color:${col}" onclick="browseGo('chap','${ch}')"><span class="tref" style="color:${col};font-size:15px">${ch}</span><span class="ttitle">${esc(ataTitle(ch))}</span><span class="tgo">${n} ▸</span></div>`;}).join("");
    box.innerHTML=html;return;}
  const ch=STATE.browseChap;const col=ataColor(ch);
  if(!STATE.browseSec){const secs=Object.keys(tree[ch]).sort();
    let html=`<div class="chips" style="margin-bottom:10px"><span class="pbtn" onclick="browseGo('backChap')">◂ CHAPTERS</span><span class="tref" style="color:${col}">ATA ${ch}</span><span style="color:#94A3B8;font-size:13px">${esc(ataTitle(ch))}</span></div><div class="meta">${secs.length} sections</div>`;
    html+=secs.map(sec=>{const n=tree[ch][sec].length;return `<div class="trow" style="grid-template-columns:90px 1fr 70px;border-left-color:${col}" onclick="browseGo('sec','${sec}')"><span class="tref" style="color:${col}">${sec}</span><span class="ttitle">${esc(secTitle(sec))}</span><span class="tgo">${n} ▸</span></div>`;}).join("");
    box.innerHTML=html;return;}
  const sec=STATE.browseSec;const ids=tree[ch][sec].slice().sort((a,b)=>STATE.rec[a][1].localeCompare(STATE.rec[b][1]));
  let html=`<div class="chips" style="margin-bottom:10px"><span class="pbtn" onclick="browseGo('backChap')">◂ CHAPTERS</span><span class="pbtn" onclick="browseGo('backSec')">◂ ${ch}</span><span class="tref" style="color:${col}">${esc(sec)}</span><span style="color:#94A3B8;font-size:13px">${esc(secTitle(sec))}</span></div><div class="meta">${ids.length} tasks</div>`;
  html+=ids.map(i=>{const r=STATE.rec[i];return `<div class="trow" style="border-left-color:${col}" onclick="openTask(${i})"><span class="tref" style="color:${col}">${esc(r[1])}</span><span class="ttitle">${esc(r[0])}</span><span class="tgo">read ▸</span></div>`;}).join("");
  box.innerHTML=html;
}
async function loadContent(ch){if(STATE.contentCache[ch])return STATE.contentCache[ch];const p=fetchGz("content/amm_"+ch+".json.gz");STATE.contentCache[ch]=p;p.catch(()=>delete STATE.contentCache[ch]);return p;}
function fmtBody(txt){
  let h=esc(txt);
  h=h.replace(/⚠ WARNING/g,'<span class="warn">⚠ WARNING</span>').replace(/⚠ CAUTION/g,'<span class="caut">⚠ CAUTION</span>').replace(/■ /g,'\n<b style="color:#60A5FA">■ </b>');
  // AMM internal links @@AMM:refloc:text@@
  h=h.replace(/@@AMM:([^:]*):([^@]*)@@/g,(m,rl,c)=>`<span class="amlink" onclick="goRef('${rl}')">${c||rl}</span>`);
  // figures @@FIG:id@@
  h=h.replace(/@@FIG:([^@]*)@@/g,(m,id)=>`<span class="figbtn" onclick="showFig('${id}',this)">▣ SHOW FIGURE</span>`);
  return h;
}
function goRef(refloc){const i=STATE.rec.findIndex(r=>r[8]===refloc||r[8]===refloc.replace(/-/g,""));if(i>=0)openTask(i);else alert("AMM task "+refloc+" not found");}
async function openTask(i){
  const r=STATE.rec[i];const col=ataColor(r[2]);window.scrollTo(0,0);STATE.mode="auto";
  $("panel").innerHTML=`<div class="viewer"><div class="vhead"><span class="vref">${esc(r[1])}</span><span class="vtitle">${esc(r[0])}</span><span class="vclose" onclick="renderUI()">&times;</span></div><div class="vbody" id="vbody">Loading procedure…</div></div>`;
  try{const pack=await loadContent(r[2]);const txt=pack[r[7]]||"(procedure text not found)";$("vbody").innerHTML=fmtBody(txt);}
  catch(e){$("vbody").innerHTML="Could not load procedure. "+esc(e.message);}
}
async function loadFigChunks(){if(STATE.figManifest)return STATE.figManifest;try{STATE.figManifest=await fetchGz("figs/_figchunks.json");}catch(e){STATE.figManifest={};}return STATE.figManifest;}
async function loadFigPack(ch){
  if(STATE.figCache[ch])return STATE.figCache[ch];
  const man=await loadFigChunks();const n=man[ch]||1;
  const p=(async()=>{
    if(n===1)return await fetchGz("figs/figamm_"+ch+".json.gz");
    const merged={};for(let c=0;c<n;c++){Object.assign(merged,await fetchGz("figs/figamm_"+ch+"_"+c+".json.gz"));}return merged;
  })();
  STATE.figCache[ch]=p;p.catch(()=>delete STATE.figCache[ch]);return p;
}
async function showFig(id,el){
  try{
    const ch=id.slice(2,4);
    const pack=await loadFigPack(ch);
    const svg=pack[id];
    if(!svg){el.outerHTML='<div style="color:#64748B;font-size:12px">Figure '+esc(id)+' not available.</div>';return;}
    let clean=svg.replace(/<\?xml[^>]*\?>/,"").replace(/<!DOCTYPE[^>]*>/,"").replace(/^\s*\]>/,"");
    const i=clean.indexOf("<svg");if(i>0)clean=clean.slice(i);
    const blob=new Blob([clean],{type:"image/svg+xml"});const url=URL.createObjectURL(blob);
    const w=document.createElement("div");w.className="figwrap";w.innerHTML='<img src="'+url+'"/>';
    el.replaceWith(w);
  }catch(e){el.outerHTML='<div style="color:#64748B;font-size:12px">Figure load failed.</div>';}
}
init();
</script></body></html>
